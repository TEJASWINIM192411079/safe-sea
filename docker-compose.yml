services:

  db:
    image: postgres:16-alpine
    container_name: safesea-db

    environment:
      POSTGRES_USER: safesea
      POSTGRES_PASSWORD: safesea
      POSTGRES_DB: safesea

    ports:
      - "5435:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U safesea -d safesea"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      container_name: safesea-backend

    depends_on:
      db:
        condition: service_healthy

    environment:
      PORT: "4500"
      PGHOST: db
      PGPORT: "5432"
      PGUSER: safesea
      PGPASSWORD: safesea
      PGDATABASE: safesea
      JWT_SECRET: safesea-secret
      DB_DIR: /app/db


    ports:
      - "4500:4500"

  frontend:
    build: ./frontend
    container_name: safesea-frontend

    depends_on:
      - backend

    ports:
      - "8085:80"

volumes:
  pgdata: